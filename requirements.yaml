requirements:
  title: Example Payments API
  description: |
    Minimal example requirements to drive the OpenAPI design-first workflow.
    Focus: charges resource with create/retrieve/list operations, bearer auth, v1 path-versioning.
  version: 1.0.0
  resources:
    - name: charge
      description: Manage charges for customers
      operations:
        - create:
            summary: Create a charge
            request: { contentType: application/json }
            response: { code: 201 }
        - retrieve:
            summary: Retrieve a charge
            response: { code: 200 }
        - list:
            summary: List charges
            response: { code: 200 }
      auth: bearer
  pagination: offset
  security:
    scheme: bearer
    scopes: []
  versioning: path
  acceptance_criteria:
    - OpenAPI 3.1 compliant
    - Reusable components with $ref
    - Paginated list endpoints for `list`
